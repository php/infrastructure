- name: Install Apache with mod-php, php and openssl
  apt:
    name:
      - apache2
      - libapache2-mod-php8.4
      - apache2-utils
      - php8.4
      - php8.4-bz2
      - php8.4-intl
      - php8.4-mbstring
      - php8.4-xml
    state: present
    update_cache: yes

- name: Create the self-signed SSL Certificate
  include_role:
    name: add_self-signed_certs

- name: Enable modules in Apache
  command: a2enmod {{ item }}
  args:
    creates: /etc/apache2/mods-enabled/{{ item }}.load
  loop:
    - env
    - ssl
    - php8.4
    - headers
    - rewrite
    - remoteip
  notify: reload apache

- name: Add remoteip logging config
  template:
    src: "templates/{{ mod_remoteip_config_file }}"
    dest: "/etc/apache2/conf-enabled/{{ mod_remoteip_config_file }}"
  notify: reload apache

- name: Create (empty) placeholder file for trusted proxy list
  file:
    path: "{{ remote_ip_trusted_proxy_list }}"
    state: touch
    owner: root
    group: root
    mode: '0644'

- name: Add opcache and other local PHP settings
  template:
    src: templates/90-local-settings.ini
    dest: /etc/php/8.4/apache2/conf.d/90-local-settings.ini
  notify: reload apache

- name: Create root for all websites
  file:
    state: directory
    dest: "{{ common_doc_root }}"
    mode: "755"
    owner: www-data
    group: www-data
    recurse: true
