<VirtualHost *:80>
	ServerName {{ preview_domain }}
	ServerAlias php.net {{ preview_domain_alias }}

	ServerAdmin {{ systems_email }}
	Redirect / https://{{ preview_domain }}
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
	ServerAdmin {{ systems_email }}
	ServerName {{ preview_domain }}
	ServerAlias {{ preview_domain_alias }} preview-internal-php-net.b-cdn.net

	DocumentRoot {{ preview_docroot }}/public

	# Logging
	ErrorLog ${APACHE_LOG_DIR}/{{ preview_domain }}-error.log
	CustomLog ${APACHE_LOG_DIR}/{{ preview_domain }}-access.log combined

	# TLS Configuration with self-signed certificates
	SSLEngine on
	SSLCertificateFile /etc/ssl/certs/php-self-signed.crt
	SSLCertificateKeyFile /etc/ssl/certs/php-self-signed.key

	# Property Specific Changes
	AddDefaultCharset utf-8
	SetEnv MIRROR_LANGUAGE "en"
	SetEnv MIRROR_STATS "0"

	# Redirect /downloads to /downloads.php
	RewriteEngine On
	RewriteRule ^downloads$ %{DOCUMENT_ROOT}/downloads.php [QSA]

	ErrorDocument 401 /error.php
	ErrorDocument 403 /error.php
	ErrorDocument 404 /error.php
</VirtualHost>
</IfModule>
