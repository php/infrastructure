# Setup firewall on all services
#
# This playbook can be used to refresh all the firewall rules on all the (non-jumphost)
# servers. It will only allow HTTPS traffic from Myra to port 443, and SSH traffic from
# the jump hosts.

- hosts:
  - rsync

  become: yes
  become_user: root
  gather_facts: true

  tasks:
  - name: Gather facts for service hosts
    setup:
      gather_subset:
        - default_ipv4
    delegate_to: "{{ item }}"
    delegate_facts: true
    loop: "{{ groups['service'] }}"

- hosts:
  - service
  - rsync

  become: yes
  become_user: root
  gather_facts: true

  tasks:
  - name: Gather facts for jumphosts
    setup:
      gather_subset:
        - default_ipv4
    delegate_to: "{{ item }}"
    delegate_facts: true
    loop: "{{ groups['jumphost'] }}"

  - name: Install ufw and tools
    apt:
      name:
      - ufw
      - jq
      - curl
      - xxd
      state: present
      update_cache: yes

  - name: Create firewall script
    template:
      dest: /local/systems/firewall.sh
      src: roles/firewall/templates/update-firewall.sh
      mode: '755'

  - name: Set up daily cron to refresh the firewall rules
    cron:
      name: "Daily firewall refresh"
      job: /local/systems/firewall.sh
      special_time: daily
      state: present

  - name: Run firewall refresh script
    command:
      cmd: /local/systems/firewall.sh
